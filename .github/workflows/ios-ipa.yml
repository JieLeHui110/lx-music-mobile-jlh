# 洛雪音乐 iOS 无签名编译脚本（TrollStore专用，自动适配版）
name: Build iOS IPA (TrollStore)
on:
  workflow_dispatch:

jobs:
  build:
    name: build
    runs-on: macos-14
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: |
            package-lock.json

      - name: Install npm dependencies
        run: npm install --legacy-peer-deps

      - name: Install CocoaPods
        run: |
          sudo gem install cocoapods
          cd ios
          # 先彻底清理旧Pod，再重新安装，确保生成正确的xcworkspace
          pod deintegrate
          pod install --repo-update --verbose
          # 列出ios目录下的文件，方便排查
          ls -la
          cd ..

      - name: Build unsigned IPA
        run: |
          cd ios
          # 🔴 核心修复：自动找到真正的xcworkspace文件，不再硬编码
          WORKSPACE_FILE=$(find . -maxdepth 1 -name "*.xcworkspace" -type d | head -n 1)
          if [ -z "$WORKSPACE_FILE" ]; then
            echo "❌ 错误：未找到xcworkspace工程文件，请检查ios目录结构"
            exit 1
          fi
          # 自动提取工程名和Scheme名
          SCHEME_NAME=$(basename "$WORKSPACE_FILE" .xcworkspace)
          echo "✅ 检测到工程文件：$WORKSPACE_FILE"
          echo "✅ 检测到Scheme名：$SCHEME_NAME"

          # 执行无签名编译
          xcodebuild \
            -workspace "$WORKSPACE_FILE" \
            -scheme "$SCHEME_NAME" \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            ONLY_ACTIVE_ARCH=NO

          # 自动找到编译生成的.app文件
          APP_PATH=$(find build/Build/Products/Release-iphoneos -name "*.app" -type d | head -n 1)
          if [ -z "$APP_PATH" ]; then
            echo "❌ 错误：编译未生成.app文件，请检查编译日志"
            exit 1
          fi
          echo "✅ 编译成功，生成.app文件：$APP_PATH"

          # 打包IPA
          mkdir -p Payload
          cp -R "$APP_PATH" Payload/
          zip -r "${SCHEME_NAME}-troll.ipa" Payload/
          mv "${SCHEME_NAME}-troll.ipa" ../

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: iOS-IPA
          path: ./*-troll.ipa
