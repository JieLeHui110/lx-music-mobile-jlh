# 洛雪音乐 iOS 无签名编译脚本（TrollStore专用，官方适配版）
name: Build iOS IPA (TrollStore)
on:
  workflow_dispatch:

jobs:
  build:
    name: build
    runs-on: macos-14
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: |
            package-lock.json

      - name: Install npm dependencies
        run: npm install --legacy-peer-deps

      - name: Install CocoaPods
        run: |
          sudo gem install cocoapods
          cd ios
          pod deintegrate
          pod install --repo-update --verbose
          cd ..

      - name: Build unsigned IPA
        run: |
          cd ios
          # 洛雪音乐官方工程名固定为 lxmusic，直接用官方参数
          xcodebuild \
            -workspace lxmusic.xcworkspace \
            -scheme lxmusic \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            ONLY_ACTIVE_ARCH=NO

          # 打包IPA
          mkdir -p Payload
          cp -R build/Build/Products/Release-iphoneos/lxmusic.app Payload/
          zip -r lxmusic-troll.ipa Payload/
          mv lxmusic-troll.ipa ../

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: iOS-IPA
          path: lxmusic-troll.ipa
