name: Build iOS
on: workflow_dispatch

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version: '18'
      - name: Install dependencies
        run: npm install
      - name: Build theme
        run: npm run build:theme
      - name: Install CocoaPods
        run: cd ios && pod install
      - name: Build IPA
        run: |
          cd ios
          xcodebuild -workspace LxMusicMobile.xcworkspace -scheme LxMusicMobile -configuration Release -archivePath build/LxMusicMobile.xcarchive archive
          xcodebuild -exportArchive -archivePath build/LxMusicMobile.xcarchive -exportOptionsPlist exportOptions.plist -exportPath build
